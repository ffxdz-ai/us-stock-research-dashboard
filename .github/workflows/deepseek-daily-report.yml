name: DeepSeek cloud daily report

on:
  schedule:
    # 12:00 Asia/Shanghai every day.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Report mode"
        type: choice
        required: true
        default: full
        options:
          - full
          - weekly

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deepseek-cloud-daily-report
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SEC_USER_AGENT: "ffxdz-ai public research dashboard contact@example.com"
      REPORT_MODE: ${{ github.event.inputs.mode || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure required secret exists
        shell: bash
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY secret is not configured."
            exit 1
          fi

      - name: Collect public market data
        run: python scripts/collect_market_data.py --mode "$REPORT_MODE"

      - name: Generate FRED macro regime
        run: python scripts/macro_regime.py

      - name: Generate FMP expectations radar
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/fmp_research.py --market-pack "$MARKET_PACK" --limit 12

      - name: Generate supply-chain radar
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/supply_chain_radar.py --market-pack "$MARKET_PACK"

      - name: Generate opportunity radar
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/opportunity_radar.py --market-pack "$MARKET_PACK"

      - name: Generate cross-market intelligence
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/cross_market_intelligence.py --market-pack "$MARKET_PACK" --supply-radar data/latest_supply_chain_radar.json --opportunity-radar data/latest_opportunity_radar.json --fmp-research data/latest_fmp_research.json

      - name: Generate event evidence radar
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/event_evidence.py --market-pack "$MARKET_PACK" --opportunity-radar data/latest_opportunity_radar.json --cross-market-intelligence data/latest_cross_market_intelligence.json --fmp-research data/latest_fmp_research.json

      - name: Generate opportunity review metrics
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/opportunity_review_metrics.py --market-pack "$MARKET_PACK" --opportunity-radar data/latest_opportunity_radar.json --journal docs/data/opportunity_journal.json

      - name: Update secondary-analysis queue
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
          fi
          python scripts/secondary_analysis_queue.py --market-pack "$MARKET_PACK" --opportunity-radar data/latest_opportunity_radar.json --cross-market-intelligence data/latest_cross_market_intelligence.json

      - name: Generate DeepSeek cloud report
        shell: bash
        run: |
          if [ "$REPORT_MODE" = "weekly" ]; then
            MARKET_PACK="data/latest_weekly_market_pack.json"
            AGENT_INPUT="data/latest_weekly_agent_input.json"
          else
            MARKET_PACK="data/latest_market_pack.json"
            AGENT_INPUT="data/latest_agent_input.json"
          fi
          python scripts/run_deepseek_cloud_report.py --mode "$REPORT_MODE" --input "$AGENT_INPUT" --market-pack "$MARKET_PACK" --opportunity-radar data/latest_opportunity_radar.json --cross-market-intelligence data/latest_cross_market_intelligence.json --event-evidence data/latest_event_evidence.json --opportunity-review-metrics data/latest_opportunity_review_metrics.json --macro-regime data/latest_macro_regime.json --fmp-research data/latest_fmp_research.json

      - name: Export public archive
        run: python scripts/export_public_reports.py --limit 80

      - name: Validate public archive
        run: python scripts/validate_public_archive.py docs/data/reports.json

      - name: Commit public archive
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/reports.json docs/data/index.json docs/data/reports docs/data/secondary_analysis_queue.json docs/data/opportunity_radar.json docs/data/opportunity_journal.json docs/data/cross_market_intelligence.json docs/data/event_evidence.json docs/data/opportunity_review_metrics.json docs/data/macro_regime.json docs/data/fmp_research.json docs/data/fmp_research_state.json
          if git diff --cached --quiet; then
            echo "No public archive changes to commit."
          else
            git commit -m "Update DeepSeek cloud report"
            git push origin HEAD:main || {
              echo "Push rejected; rebasing generated report commit onto latest main and retrying."
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main
            }
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
